<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#3c2415"/>
  <!-- Subtle grain lines -->
  <line x1="0" y1="100" x2="1200" y2="105" stroke="rgba(90,58,37,0.3)" stroke-width="1"/>
  <line x1="0" y1="200" x2="1200" y2="203" stroke="rgba(90,58,37,0.2)" stroke-width="1"/>
  <line x1="0" y1="350" x2="1200" y2="348" stroke="rgba(90,58,37,0.3)" stroke-width="1"/>
  <line x1="0" y1="500" x2="1200" y2="503" stroke="rgba(90,58,37,0.2)" stroke-width="1"/>
  <!-- Gold accent line -->
  <rect x="100" y="180" width="80" height="3" rx="1" fill="#b8860b"/>
  <!-- Business name -->
  <text x="100" y="260" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="64" fill="#faf7f2">ARED</text>
  <text x="100" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="32" fill="#faf7f2" opacity="0.85">Furniture Repair &amp; Antique Restoration</text>
  <!-- Tagline -->
  <text x="100" y="390" font-family="system-ui, sans-serif" font-size="24" fill="#b8860b">Restoring Craftsmanship Since 1980</text>
  <!-- Bottom info bar -->
  <rect x="0" y="530" width="1200" height="100" fill="rgba(0,0,0,0.3)"/>
  <text x="100" y="585" font-family="system-ui, sans-serif" font-size="20" fill="#faf7f2" opacity="0.8">Wylie, TX  |  (214) 682-6371  |  Free Pickup &amp; Delivery in DFW</text>
  <!-- Gold diamond ornament -->
  <rect x="595" y="440" width="10" height="10" rx="1" fill="#b8860b" transform="rotate(45 600 445)"/>
  <line x1="520" y1="445" x2="590" y2="445" stroke="#b8860b" stroke-width="1" opacity="0.6"/>
  <line x1="610" y1="445" x2="680" y2="445" stroke="#b8860b" stroke-width="1" opacity="0.6"/>
</svg>
